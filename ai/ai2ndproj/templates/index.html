<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TrackTech - AI Technology Explorer</title>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <!-- Marked.js for Markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* CSS Styling with animations and glassmorphism */
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-gradient-1: #0f172a;
      --bg-gradient-2: #1e1b4b;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #cbd5e1;
      --user-msg-bg: #4f46e5;
      --bot-msg-bg: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      padding: 20px;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app-container {
      width: 100%;
      max-width: 800px;
      height: 85vh;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 24px;
      border-bottom: 1px solid var(--glass-border);
      background: rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .chat-window {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    /* Scrollbar styling */
    .chat-window::-webkit-scrollbar { width: 6px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }

    .message-wrapper {
      display: flex;
      gap: 16px;
      max-width: 85%;
      animation: slideIn 0.4s ease forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    @keyframes slideIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .message-wrapper.user { align-self: flex-end; flex-direction: row-reverse; }
    .message-wrapper.bot { align-self: flex-start; }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .user .avatar { background: linear-gradient(135deg, #10b981, #059669); }
    .bot .avatar { background: linear-gradient(135deg, #6366f1, #4f46e5); }

    .message-bubble {
      padding: 16px 20px;
      border-radius: 20px;
      font-size: 0.95rem;
      line-height: 1.6;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .user .message-bubble {
      background: var(--user-msg-bg);
      color: white;
      border-top-right-radius: 4px;
    }

    .bot .message-bubble {
      background: var(--bot-msg-bg);
      border: 1px solid var(--glass-border);
      border-top-left-radius: 4px;
    }

    /* Markdown Styling in Bot Message */
    .bot .message-bubble h1, .bot .message-bubble h2, .bot .message-bubble h3 { margin-bottom: 12px; font-family: 'Outfit', sans-serif; color: #fff; }
    .bot .message-bubble p { margin-bottom: 12px; }
    .bot .message-bubble p:last-child { margin-bottom: 0; }
    .bot .message-bubble ul, .bot .message-bubble ol { margin-left: 20px; margin-bottom: 12px; }
    .bot .message-bubble li { margin-bottom: 4px; }
    .bot .message-bubble strong { color: #f8fafc; font-weight: 600; }
    .bot .message-bubble pre { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; margin: 12px 0; overflow-x: auto; }
    .bot .message-bubble code { font-family: monospace; background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    .bot .message-bubble a { color: #a5b4fc; text-decoration: none; }
    .bot .message-bubble a:hover { text-decoration: underline; }

    .input-area {
      padding: 20px 24px;
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid var(--glass-border);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 8px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .input-wrapper:focus-within {
      border-color: rgba(99, 102, 241, 0.5);
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
    }

    .input-area input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: white;
      font-size: 1rem;
      padding: 10px 16px;
      font-family: inherit;
    }

    .input-area input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .input-area button {
      background: var(--primary);
      color: white;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .input-area button:hover {
      background: var(--primary-hover);
      transform: scale(1.05);
    }

    .input-area button:active {
      transform: scale(0.95);
    }

    /* Typing Indicator Indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <h1>TrackTech AI</h1>
      <p>Delivering the Edge in Global Technological Innovations</p>
    </div>
    
    <div class="chat-window" id="chatWindow">
      <div class="message-wrapper bot">
        <div class="avatar">🤖</div>
        <div class="message-bubble">
          <p>Hi there! I'm TrackTech, your AI guide to the forefront of global technological innovation. Ask me about the latest in AI, space exploration, robotics, quantum computing, or biotech!</p>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="userInput" placeholder="Ask about recent tech breakthroughs..." autocomplete="off"/>
        <button id="sendBtn" aria-label="Send Message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const chatWindow = document.getElementById('chatWindow');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Automatically parse markdown
    marked.setOptions({
      breaks: true,
      gfm: true
    });

    function appendMessage(sender, text, isMarkdown=false) {
      const wrapper = document.createElement('div');
      wrapper.className = `message-wrapper ${sender}`;
      
      const avatarStr = sender === 'user' ? '👤' : '🤖';
      
      const contentHtml = isMarkdown ? marked.parse(text) : `<p>${text}</p>`;

      wrapper.innerHTML = `
        <div class="avatar">${avatarStr}</div>
        <div class="message-bubble">${contentHtml}</div>
      `;

      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function showTyping() {
      const wrapper = document.createElement('div');
      wrapper.className = 'message-wrapper bot typing';
      wrapper.id = 'typingIndicator';
      wrapper.innerHTML = `
        <div class="avatar">🤖</div>
        <div class="message-bubble">
          <div class="typing-indicator">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
        </div>
      `;
      chatWindow.appendChild(wrapper);
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function removeTyping() {
      const indicator = document.getElementById('typingIndicator');
      if (indicator) {
        indicator.remove();
      }
    }

    async function handleSend() {
      const text = userInput.value.trim();
      if (!text) return;

      appendMessage('user', text, false);
      userInput.value = '';
      
      showTyping();

      try {
        const response = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });

        const data = await response.json();
        removeTyping();
        appendMessage('bot', data.reply || "Something went wrong.", true);

      } catch (err) {
        console.error(err);
        removeTyping();
        appendMessage('bot', "⚠ Network error. Could not connect to the server.", false);
      }
    }

    sendBtn.addEventListener('click', handleSend);
    userInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleSend();
    });
    
    // Auto-focus input
    userInput.focus();
  </script>
</body>
</html>
